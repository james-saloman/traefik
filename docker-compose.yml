services:
  traefik-mastery:
    build:
      context: .
      dockerfile: Dockerfile
    image: traefik-mastery:latest
    container_name: traefik-mastery
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
